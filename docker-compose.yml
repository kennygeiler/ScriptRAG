# ScriptRAG Streamlit + optional env from `.env` (copy from `.env.example`).
#
# Neo4j: this file does not start a database. Point NEO4J_* at Neo4j Aura (or any Bolt endpoint).
#
# Local Neo4j in Docker (optional): uncomment `neo4j` service and `depends_on`, set in `.env`:
#   NEO4J_URI=bolt://neo4j:7687
#   NEO4J_USER=neo4j
#   NEO4J_PASSWORD=<same as NEO4J_AUTH password below>

services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Set to 1 for read-only dashboard; remove or set to 0 to enable in-browser pipeline.
      DISABLE_PIPELINE: "${DISABLE_PIPELINE:-0}"
    # depends_on:
    #   - neo4j

  # Uncomment for a self-contained demo (empty DB until you run neo4j_loader from the host against bolt://localhost:7687).
