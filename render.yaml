# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → connect this repo → set secret env vars when prompted.

services:
  - type: web
    name: scriptrag
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Free tier spins down; use starter for always-on demos.
    plan: free
    healthCheckPath: /_stcore/health
    envVars:
      # Remove or set to 0 to enable in-browser pipeline; set to 1 for read-only dashboard.
      # - key: DISABLE_PIPELINE
      #   value: "1"
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional: LangSmith telemetry for the ETL pipeline
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: scriptrag
