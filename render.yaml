# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → connect this repo → set secret env vars when prompted.
#
# Persistent disk: keeps pipeline_efficiency_log.json across deploys. Requires a paid
# instance type (Starter+). Free tier cannot attach disks — remove `disk` and use `plan: free`.

services:
  - type: web
    name: scriptrag
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Starter required for persistent disk (not available on Free).
    plan: starter
    healthCheckPath: /_stcore/health
    disk:
      name: scriptrag-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PERSISTENT_DATA_DIR
        value: /var/data
      # Remove or set to 0 to enable in-browser pipeline; set to 1 for read-only Streamlit (no Pipeline tab).
      # - key: DISABLE_PIPELINE
      #   value: "1"
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional: LangSmith telemetry for the ETL pipeline
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: scriptrag
